<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preddi</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div id="chat-app">
        <header class="chat-header">
            <div class="header-left">
                <div class="agent-avatar">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 8V4H8"/>
                        <rect width="16" height="12" x="4" y="8" rx="2"/>
                        <path d="M2 14h2"/><path d="M20 14h2"/>
                        <path d="M15 13v2"/><path d="M9 13v2"/>
                    </svg>
                </div>
                <div class="header-info">
                    <h1>Preddi</h1>
                    <span class="status-indicator" id="status-indicator">
                        <span class="status-dot"></span>
                        <span id="status-text">Ready</span>
                    </span>
                </div>
            </div>
            <div class="header-actions">
                <button id="btn-new-session" class="btn-icon" title="New conversation">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 5v14M5 12h14"/>
                    </svg>
                </button>
            </div>
        </header>

        <div id="chat-messages" class="chat-messages">
            <div class="welcome-message">
                <div class="welcome-icon">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 8V4H8"/>
                        <rect width="16" height="12" x="4" y="8" rx="2"/>
                        <path d="M2 14h2"/><path d="M20 14h2"/>
                        <path d="M15 13v2"/><path d="M9 13v2"/>
                    </svg>
                </div>
                <h2>Hi, I'm Preddi</h2>
                <p>Start a conversation with me. You can send text, paste images, attach documents, or use the microphone.</p>
            </div>
        </div>

        <div id="file-preview" class="file-preview hidden">
            <div id="file-preview-items" class="file-preview-items"></div>
        </div>

        <div class="chat-input-container">
            <div id="skill-chip-container" class="skill-chip-container hidden"></div>
            <div class="input-wrapper">
                <button id="btn-attach" class="btn-icon input-action" title="Attach file">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                    </svg>
                </button>
                <div class="textarea-wrapper">
                    <textarea id="message-input" placeholder="Type your message... (@ to select skill)" rows="1"></textarea>
                    <div id="skill-dropdown" class="skill-dropdown hidden"></div>
                </div>
                <button id="btn-mic" class="btn-icon input-action" title="Voice input">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
                        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                        <line x1="12" x2="12" y1="19" y2="22"/>
                    </svg>
                </button>
                <button id="btn-send" class="btn-send" title="Send message">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="m22 2-7 20-4-9-9-4z"/>
                        <path d="M22 2 11 13"/>
                    </svg>
                </button>
            </div>
            <input type="file" id="file-input" multiple accept="image/*,.pdf,.doc,.docx,.txt,.csv,.xlsx,.xls" class="hidden">
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/chat.js') }}"></script>
</body>
</html>
